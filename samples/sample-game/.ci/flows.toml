# Takatora sample flows — minimal definitions for runner smoke tests.

[[flow]]
id = "smoke"
name = "Smoke test (notify only)"

[flow.vars]
message = { type = "string", default = "hello from takatora" }

[[flow.steps]]
type = "notify.console"

