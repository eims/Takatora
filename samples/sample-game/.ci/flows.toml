# Takatora sample flows.
#
# `smoke` runs anywhere (the runner integration tests use it). The two
# `package*` flows do the SAME job — stamp a version file from git, build a
# Windows package, zip it — two ways, to show the custom-task escape hatch:
#   • package         → built-in tasks only (git.info + fs.write to stamp)
#   • package-custom  → a project-local .fsx task (pkg.stamp) for the stamp
# When a step needs conditional/formatting logic that's awkward in flow
# params, swap a built-in composition for one .fsx in .ci/tasks/. (The
# package* flows need Unreal to actually run; smoke needs nothing.)

[[flow]]
id = "smoke"
name = "Smoke test (notify only)"

[flow.vars]
message = { type = "string", default = "hello from takatora" }

[[flow.steps]]
type = "notify.console"

# ── package: built-in tasks only ─────────────────────────────────────
[[flow]]
id = "package"
name = "Windows package — built-in tasks"

[flow.vars]
configuration = { type = "enum", values = ["Development", "DebugGame", "Shipping", "Test"], default = "Development", description = "Build configuration — Shipping for release builds." }

# Stamp a version file with two built-in tasks: git.info records the commit
# as step outputs, fs.write interpolates them into the file.
[[flow.steps]]
id = "git"
type = "git.info"

[[flow.steps]]
id = "stamp"
type = "fs.write"
path = "Build/VERSION.txt"
content = "commit=${steps.git.outputs.hash}\nmodified=${steps.git.outputs.modified}\ndate=${steps.git.outputs.date}\n"

[[flow.steps]]
id = "build"
type = "ue.build_cook_run"
configuration = "${vars.configuration}"
platform = "Win64"
target = "SampleGame"  # ← your game target (often the project name)
archive_dir = "Package/Windows"
extra_uat_args = ["-noP4", "-pak", "-prereqs", "-allmaps", "-targetplatform=Win64"]

[[flow.steps]]
id = "zip"
type = "fs.zip"
from = "Package/Windows"
to = "Package/SampleGame-Windows.zip"

# ── package-custom: a project-local .fsx replaces the stamp step ──────
[[flow]]
id = "package-custom"
name = "Windows package — custom-task stamp"

[flow.vars]
configuration = { type = "enum", values = ["Development", "DebugGame", "Shipping", "Test"], default = "Development", description = "Build configuration — Shipping for release builds." }

# pkg.stamp (.ci/tasks/pkg.stamp.fsx) does the git read + file write in one
# task — same result as git.info + fs.write above, but the formatting lives
# in code. Shows as "source: project" in the GUI step Inspector.
[[flow.steps]]
id = "stamp"
type = "pkg.stamp"

[[flow.steps]]
id = "build"
type = "ue.build_cook_run"
configuration = "${vars.configuration}"
platform = "Win64"
target = "SampleGame"  # ← your game target (often the project name)
archive_dir = "Package/Windows"
extra_uat_args = ["-noP4", "-pak", "-prereqs", "-allmaps", "-targetplatform=Win64"]

[[flow.steps]]
id = "zip"
type = "fs.zip"
from = "Package/Windows"
to = "Package/SampleGame-Windows.zip"

# ── clean ─────────────────────────────────────────────────────────────
[[flow]]
id = "clean"
name = "Clean (intermediate + binaries)"

[[flow.steps]]
type = "ue.clean"
preset = "safe"
