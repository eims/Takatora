name: release

# Tag-driven release. Push a tag like `v0.1.0-alpha` and this builds the
# single-file bundle and attaches it to a GitHub Release. Runs on a
# GitHub-hosted Windows runner — no self-hosted agent: building the bundle
# is just `dotnet publish` and needs no game engine installed.
#
# Before tagging, bump Version.Version in src/Takatora.Core/Library.fs to match
# the tag (it drives `takatora version` and the GUI About). Tags with a
# hyphen (-alpha/-beta/-rc) are marked as pre-releases.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # create the GitHub Release + upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Two variants of the same CLI + GUI bundle (takatora.exe +
      # Takatora.Gui.exe + Takatora.Tasks.dll + builtin-tasks/ +
      # THIRD-PARTY-NOTICES.txt), each in its own shared folder:
      #   publish/Takatora               framework-dependent (~13MB zip, needs .NET 8)
      #   publish/Takatora-with-runtime  self-contained      (~70MB zip, no install)
      - name: Publish bundles
        shell: pwsh
        run: |
          ./publish.ps1 -Target Both
          ./publish.ps1 -Target Both -SelfContained

      - name: Stage release zips
        shell: pwsh
        run: |
          Copy-Item LICENSE publish/Takatora/
          Copy-Item LICENSE publish/Takatora-with-runtime/
          Compress-Archive -Path publish/Takatora/* -DestinationPath Takatora-win-x64.zip -Force
          Compress-Archive -Path publish/Takatora-with-runtime/* -DestinationPath Takatora-win-x64-with-runtime.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Takatora-win-x64.zip
            Takatora-win-x64-with-runtime.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Create as a DRAFT: the build + asset upload happen automatically,
          # but nothing is public until you review and click "Publish release".
          # A safety gate to catch mistakes before they ship.
          draft: true
